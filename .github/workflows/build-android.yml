name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Android SDK platform 34
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Copy web assets into Android project
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r dist/. android/app/src/main/assets/public/
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json
          echo '{"assets":{"path":"public"},"server":{"androidScheme":"https"}}' \
            > android/app/src/main/assets/capacitor.plugins.json

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        id: gradle_build
        continue-on-error: true
        run: |
          cd android && ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle.log
          exit ${PIPESTATUS[0]}
        env:
          GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false"
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Publish Gradle error log to ci-logs branch
        if: steps.gradle_build.outcome == 'failure'
        run: |
          git config user.email "ci@github-actions"
          git config user.name "GitHub Actions"
          git fetch origin ci-logs 2>/dev/null || true
          git worktree add /tmp/ci-logs ci-logs 2>/dev/null || \
            (git checkout --orphan ci-logs-tmp && git rm -rf . --quiet && \
             git worktree add /tmp/ci-logs ci-logs 2>/dev/null) || \
            (git worktree add --detach /tmp/ci-logs && \
             cd /tmp/ci-logs && git checkout --orphan ci-logs && git rm -rf . 2>/dev/null || true)
          tail -500 /tmp/gradle.log > /tmp/ci-logs/gradle-error.log
          cd /tmp/ci-logs
          git add gradle-error.log
          git commit -m "CI: Gradle error log $(date -u +%Y-%m-%dT%H:%M:%SZ)" || true
          git push origin ci-logs --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if APK was not produced
        if: steps.gradle_build.outcome == 'failure'
        run: exit 1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dinosaurs-land-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Gradle log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs
          path: |
            android/app/build/reports/
            /tmp/gradle.log
          retention-days: 7
